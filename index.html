<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Cuestionario de Examen — Java & Estructuras de Datos</title>
<style>

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #252a38;
    --accent: #f0c040;
    --accent2: #40c8f0;
    --accent3: #f04070;
    --text: #e8eaf0;
    --muted: #6b7280;
    --correct: #34d399;
    --wrong: #f87171;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 28px 40px 22px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #scoreboard {
    display: flex;
    gap: 18px;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
  }

  .score-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 6px 16px;
    color: var(--text);
  }

  .score-pill span { color: var(--accent); font-weight: 700; }

  #progress-wrap {
    width: 100%;
    height: 4px;
    background: var(--border);
    position: sticky;
    top: 76px;
    z-index: 99;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width 0.4s ease;
  }

  /* NAV TABS */
  nav {
    display: flex;
    gap: 6px;
    padding: 24px 40px 0;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 8px 18px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .tab-btn:hover { border-color: var(--accent); color: var(--accent); }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f14;
  }

  /* SECTIONS */
  .section {
    display: none;
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .section.visible { display: block; }

  .section-header {
    margin-bottom: 32px;
  }

  .chapter-tag {
    display: inline-block;
    background: var(--accent);
    color: #0d0f14;
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border-radius: 4px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .section-header h2 {
    font-size: 1.7rem;
    font-weight: 800;
    line-height: 1.2;
  }

  .section-header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 8px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .question-card.answered-correct { border-color: var(--correct); }
  .question-card.answered-wrong   { border-color: var(--wrong); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 20px 22px 16px;
  }

  .q-num {
    background: var(--surface2);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    min-width: 36px;
    padding: 4px 6px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .q-text {
    font-size: 0.97rem;
    font-weight: 600;
    line-height: 1.55;
  }

  .q-code {
    background: #0a0c10;
    border-left: 3px solid var(--accent2);
    border-radius: 0 6px 6px 0;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.6;
    margin: 0 22px 16px;
    padding: 14px 18px;
    overflow-x: auto;
    white-space: pre;
    color: #c9d1e0;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 22px 20px;
  }

  .option-btn {
    align-items: flex-start;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    gap: 12px;
    padding: 11px 16px;
    text-align: left;
    transition: all 0.18s;
    width: 100%;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent2);
    background: #1e2434;
  }

  .opt-letter {
    background: var(--border);
    border-radius: 4px;
    color: var(--muted);
    flex-shrink: 0;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 7px;
    text-transform: uppercase;
    transition: all 0.18s;
  }

  .option-btn.correct {
    background: rgba(52,211,153,0.1);
    border-color: var(--correct);
  }
  .option-btn.correct .opt-letter {
    background: var(--correct);
    color: #0d0f14;
  }

  .option-btn.wrong {
    background: rgba(248,113,113,0.1);
    border-color: var(--wrong);
  }
  .option-btn.wrong .opt-letter {
    background: var(--wrong);
    color: #0d0f14;
  }

  .option-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    display: none;
    font-size: 0.83rem;
    margin: -4px 22px 16px;
    padding: 10px 14px;
    border-radius: 6px;
    line-height: 1.5;
  }

  .feedback.show { display: block; }
  .feedback.ok  { background: rgba(52,211,153,0.1); color: var(--correct); border: 1px solid rgba(52,211,153,0.3); }
  .feedback.no  { background: rgba(248,113,113,0.1); color: var(--wrong);   border: 1px solid rgba(248,113,113,0.3); }

  /* RESET BTN */
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.78rem;
    padding: 7px 16px;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  /* SECTION SCORE */
  .section-score {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    margin-bottom: 28px;
    font-size: 0.88rem;
  }

  .section-score strong { color: var(--accent); font-family: 'Space Mono', monospace; }
</style>
</head>

// =============================================================
// STATE
// =============================================================
let state = {
  answered: {}, // key: "cap-q" => {correct: bool}
};

// =============================================================
// BUILD UI
// =============================================================
function buildUI() {
  const container = document.getElementById('sections-container');
  container.innerHTML = '';

  chapters.forEach((ch, ci) => {
    const sec = document.createElement('div');
    sec.className = 'section' + (ci === 0 ? ' visible' : '');
    sec.id = 'section-' + ci;

    const scoreHtml = `<div class="section-score">
      <span>Sección: <strong id="sec-score-${ci}">0 / ${ch.questions.length}</strong></span>
      <button class="reset-btn" onclick="resetSection(${ci})">↺ Reiniciar sección</button>
    </div>`;

    const qHtml = ch.questions.map((q, qi) => buildQuestion(q, ci, qi)).join('');

    sec.innerHTML = `
      <div class="section-header">
        <div class="chapter-tag">${ch.tag}</div>
        <h2>${ch.title}</h2>
        <p>${ch.desc}</p>
      </div>
      ${scoreHtml}
      ${qHtml}
    `;
    container.appendChild(sec);
  });

  updateProgress();
}

function buildQuestion(q, ci, qi) {
  const key = `${ci}-${qi}`;
  const answered = state.answered[key];

  const optHtml = ['a','b','c','d'].map((letter, oi) => {
    let cls = 'option-btn';
    if (answered !== undefined) {
      if (oi === q.ans) cls += ' correct';
      else if (oi === answered.chosen) cls += ' wrong';
    }
    const disabled = answered !== undefined ? 'disabled' : '';
    return `<button class="option-btn ${answered !== undefined ? (oi === q.ans ? 'correct' : (oi === answered.chosen ? 'wrong' : '')) : ''}" 
      ${disabled} onclick="answer(${ci}, ${qi}, ${oi})">
      <span class="opt-letter">${letter}</span>
      <span>${q.opts[oi]}</span>
    </button>`;
  }).join('');

  let feedbackHtml = '';
  if (answered !== undefined) {
    const cls2 = answered.correct ? 'ok' : 'no';
    const icon = answered.correct ? '✓ Correcto.' : '✗ Incorrecto.';
    feedbackHtml = `<div class="feedback show ${cls2}">${icon} ${q.exp}</div>`;
  }

  const cardCls = answered !== undefined ? (answered.correct ? 'answered-correct' : 'answered-wrong') : '';
  const codeHtml = q.code ? `<pre class="q-code">${q.code}</pre>` : '';

  return `<div class="question-card ${cardCls}" id="card-${ci}-${qi}">
    <div class="q-header">
      <div class="q-num">${String(qi+1).padStart(2,'0')}</div>
      <div class="q-text">${q.q}</div>
    </div>
    ${codeHtml}
    <div class="options" id="opts-${ci}-${qi}">${optHtml}</div>
    ${feedbackHtml}
  </div>`;
}

// =============================================================
// ANSWER
// =============================================================
function answer(ci, qi, chosen) {
  const key = `${ci}-${qi}`;
  if (state.answered[key] !== undefined) return;

  const q = chapters[ci].questions[qi];
  const correct = chosen === q.ans;
  state.answered[key] = { chosen, correct };

  // Update card
  const card = document.getElementById(`card-${ci}-${qi}`);
  card.classList.add(correct ? 'answered-correct' : 'answered-wrong');

  // Update buttons
  const optsDiv = document.getElementById(`opts-${ci}-${qi}`);
  const btns = optsDiv.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  // Add feedback
  const fb = document.createElement('div');
  fb.className = `feedback show ${correct ? 'ok' : 'no'}`;
  fb.innerHTML = `${correct ? '✓ Correcto.' : '✗ Incorrecto.'} ${q.exp}`;
  card.appendChild(fb);

  updateScores();
}

// =============================================================
// SCORES & PROGRESS
// =============================================================
function updateScores() {
  let totalCorrect = 0;
  let totalAnswered = 0;

  chapters.forEach((ch, ci) => {
    let secCorrect = 0;
    ch.questions.forEach((_, qi) => {
      const k = `${ci}-${qi}`;
      if (state.answered[k] !== undefined) {
        totalAnswered++;
        if (state.answered[k].correct) { secCorrect++; totalCorrect++; }
      }
    });
    const el = document.getElementById(`sec-score-${ci}`);
    if (el) el.textContent = `${secCorrect} / ${ch.questions.length}`;
  });

  document.getElementById('total-correct').textContent = totalCorrect;
  document.getElementById('total-answered').textContent = totalAnswered;
  updateProgress();
}

function updateProgress() {
  const total = chapters.reduce((s, ch) => s + ch.questions.length, 0);
  const answered = Object.keys(state.answered).length;
  document.getElementById('progress-bar').style.width = ((answered / total) * 100) + '%';
}

// =============================================================
// NAVIGATION
// =============================================================
function showSection(idx) {
  document.querySelectorAll('.section').forEach((s, i) => {
    s.classList.toggle('visible', i === idx);
  });
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// =============================================================
// RESET
// =============================================================
function resetSection(ci) {
  chapters[ci].questions.forEach((_, qi) => {
    delete state.answered[`${ci}-${qi}`];
  });
  buildUI();
  showSection(ci);
  updateScores();
}

function resetAll() {
  state.answered = {};
  buildUI();
  updateScores();
}

// =============================================================
// INIT
// =============================================================
buildUI();
updateScores();
</script>
